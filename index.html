<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>이야기가 마르던 밤</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--fs:13px;--img-max:800px}
body{background:#1a1816;font-family:'Nanum Myeongjo',serif;overflow-x:hidden}

/* ── 로딩 ── */
#loading{position:fixed;inset:0;background:#1a1816;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#loading .star{color:#c9973a;font-size:32px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:1}}
#loading p{color:rgba(255,255,255,.4);font-family:sans-serif;font-size:13px;letter-spacing:.1em}
#loading.done{display:none}

/* ── 뷰 토글 버튼 ── */
#toggle-btn{
  position:absolute;top:16px;right:16px;z-index:50;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.65);font-family:sans-serif;font-size:11px;
  letter-spacing:.1em;padding:6px 14px;border-radius:20px;cursor:pointer;
  backdrop-filter:blur(6px);transition:all .2s;white-space:nowrap;
}
#toggle-btn:hover{background:rgba(255,255,255,.18);color:#fff}

/* ════════════════════════════════
   서적뷰 (BOOK VIEW)
════════════════════════════════ */
#book-view{display:flex;flex-direction:column;align-items:center;padding:6vh 0 10vh;gap:6vh}
#book-view.hidden{display:none}

.spread{
  position:relative;width:min(96vw,calc(88vh*1.5));aspect-ratio:3/2;
  flex-shrink:0;background:#0a0c12;box-shadow:0 18px 72px rgba(0,0,0,.88);display:flex;
  scroll-margin-top:3vh;
}
.spread::after{
  content:'';position:absolute;top:0;bottom:0;left:50%;width:44px;
  transform:translateX(-50%);
  background:linear-gradient(to right,transparent,rgba(0,0,0,.25) 46%,rgba(0,0,0,.35) 50%,rgba(0,0,0,.25) 54%,transparent);
  pointer-events:none;z-index:5;
}
.spread.fullbleed{display:block}
.pageL,.pageR{position:relative;flex:1;overflow:hidden}
.pg-fill{width:100%;height:100%;position:relative}
.pg-img{width:100%;height:100%;object-fit:cover;display:block}
.img-err{width:100%;height:100%;background:#0f1420;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#2a3450;font-family:sans-serif;font-size:12px}
.img-err .num{font-size:28px;color:#1e2840}

/* 오버레이 — 불투명도 낮춤 */
.txt{position:absolute;z-index:4}
.txt p{line-height:1.95;font-size:var(--fs)}
.t-ov{left:0;right:0;bottom:0;padding:7% 8% 5%;
  background:linear-gradient(to bottom,transparent 0%,rgba(3,5,10,.30) 30%,rgba(3,5,10,.58) 62%,rgba(3,5,10,.72) 100%);
  color:#f2ece0;text-shadow:0 1px 6px rgba(0,0,0,.85)}
.t-ovS{left:0;right:0;bottom:0;padding:7% 8% 5%;
  background:linear-gradient(to bottom,transparent 0%,rgba(4,6,13,.38) 25%,rgba(4,6,13,.65) 58%,rgba(4,6,13,.78) 100%);
  color:#f2ece0;text-shadow:0 1px 6px rgba(0,0,0,.9)}
.t-pl{color:#e9e2d2;text-shadow:0 2px 8px rgba(0,0,0,.95)}
.t-pd{color:#4a4438;text-shadow:none}
.pos-tl{top:6%;left:8%;right:52%}
.pos-l{top:28%;left:7%;right:52%}
.pos-r{top:14%;left:54%;right:6%}
.pos-bl{bottom:7%;left:7%;right:48%}
.sm p{font-size:calc(var(--fs)*0.82);line-height:2.1}

.textpage{width:100%;height:100%;background:#ece5d6;display:flex;align-items:center;justify-content:center;padding:12%}
.textpage.dark{background:#0b0f1a}
.textpage p{color:#4a4438;font-size:calc(var(--fs)*1.05);line-height:2.2;letter-spacing:.04em}
.textpage.dark p{color:#c9c2b2}
.titlepage{width:100%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8%}
.titlepage .cover-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.titlepage .cover-grad{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(4,6,12,.55) 60%,rgba(4,6,12,.82) 80%,rgba(4,6,12,.93) 100%)}
.titlepage .cover-text{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px}
.titlepage h1{color:#e9e2d2;font-weight:700;letter-spacing:.3em;font-size:calc(var(--fs)*2.2);text-shadow:0 2px 12px rgba(0,0,0,.8)}
.titlepage .sub{color:#8a96a8;font-size:calc(var(--fs)*0.75);letter-spacing:.3em;font-family:sans-serif}
.titlepage .star-deco{color:#c9973a;font-size:calc(var(--fs)*1.4);margin-bottom:4px}
.endpage{width:100%;height:100%;background:#ece5d6;position:relative;display:flex;align-items:center;justify-content:center}
.endpage p{color:#6b6355;font-size:calc(var(--fs)*1.1);text-align:center;letter-spacing:.3em;line-height:2.5}
.endpage .credit{position:absolute;bottom:5%;left:0;right:0;text-align:center;color:#9a9284;font-family:sans-serif;font-size:calc(var(--fs)*0.65);letter-spacing:.07em}
.review{position:absolute;top:8px;left:8px;z-index:9;background:rgba(180,140,40,.88);color:#0a0c12;font-family:sans-serif;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px}

/* 서적뷰 네비 */
#nav{position:fixed;right:20px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;z-index:200}
#nav.hidden{display:none}
.nb{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.18);color:rgba(255,255,255,.7);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;backdrop-filter:blur(6px);box-shadow:0 4px 18px rgba(0,0,0,.4)}
.nb:hover{background:rgba(255,255,255,.17);color:#fff;transform:scale(1.08)}
.nb:disabled{opacity:.18;cursor:default;transform:none}
#ind{color:rgba(255,255,255,.3);font-family:sans-serif;font-size:11px;letter-spacing:.06em;text-align:center}

/* ════════════════════════════════
   웹툰뷰 (WEBTOON VIEW)
════════════════════════════════ */
#webtoon-view{display:none;flex-direction:column;align-items:center;padding:0 0 10vh}
#webtoon-view.active{display:flex}

.wt-scene{width:100%;max-width:var(--img-max);position:relative}

/* 웹툰 이미지 */
.wt-img{position:relative;width:100%}
.wt-img img{width:100%;display:block;aspect-ratio:3/4;object-fit:cover}

/* 웹툰 오버레이 (서적뷰보다 더 가볍게) */
.wt-img .wt-ov{
  position:absolute;left:0;right:0;bottom:0;padding:12% 9% 7%;
  background:linear-gradient(to bottom,transparent 0%,rgba(3,5,10,.22) 32%,rgba(3,5,10,.50) 64%,rgba(3,5,10,.62) 100%);
  color:#f2ece0;text-shadow:0 1px 6px rgba(0,0,0,.8);
}
.wt-img .wt-ov p{line-height:2.05;font-size:clamp(13px,3.84vw,19px);word-break:keep-all}
.wt-img .wt-ovS{
  position:absolute;left:0;right:0;bottom:0;padding:12% 9% 7%;
  background:linear-gradient(to bottom,transparent 0%,rgba(4,6,13,.28) 28%,rgba(4,6,13,.55) 58%,rgba(4,6,13,.70) 100%);
  color:#f2ece0;text-shadow:0 1px 6px rgba(0,0,0,.9);
}
.wt-img .wt-ovS p{line-height:2.05;font-size:clamp(13px,3.84vw,19px);word-break:keep-all}
/* 이미지 상단 부착 텍스트 */
.wt-img .wt-top{
  position:absolute;left:0;right:0;top:0;padding:6% 9% 13%;
  background:linear-gradient(to bottom,rgba(3,5,10,.58) 0%,rgba(3,5,10,.34) 55%,transparent 100%);
  color:#f2ece0;text-shadow:0 1px 6px rgba(0,0,0,.8);
}
.wt-img .wt-top p{line-height:2.05;font-size:clamp(13px,3.84vw,19px);word-break:keep-all}
.wt-img .wt-ov.narrow,.wt-img .wt-ovS.narrow,.wt-img .wt-top.narrow{padding-left:5%;padding-right:5%}

/* 웹툰 갭 텍스트 */
.wt-gap{
  width:100%;background:#1a1816;
  padding:12vh 10%;
  display:flex;align-items:center;justify-content:flex-start;
}
.wt-gap.center{justify-content:center;text-align:center}
.wt-gap.right{justify-content:flex-end;text-align:right}
.wt-gap.narrow{padding-left:5.5%;padding-right:5.5%}
.wt-gap p{color:#ddd7c8;line-height:2.2;font-size:clamp(14px,4.1vw,19px);letter-spacing:.03em;word-break:keep-all}

/* 웹툰 장면간 여백 스페이서 (이미지 높이의 20%) */
.wt-rule{width:100%;max-width:var(--img-max);height:min(26.67vw,213px);background:transparent;margin:0 auto}

/* 웹툰 타이틀 */
.wt-title{
  width:100%;max-width:var(--img-max);
  aspect-ratio:3/4;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:8%;
}
.wt-title h1{color:#e9e2d2;font-weight:700;letter-spacing:.3em;font-size:clamp(18px,5vw,34px);text-shadow:0 2px 12px rgba(0,0,0,.8)}
.wt-title .sub{color:#8a96a8;font-size:clamp(9px,2.2vw,13px);letter-spacing:.3em;font-family:sans-serif}
.wt-title .star-deco{color:#c9973a;font-size:clamp(16px,4vw,24px);margin-bottom:4px}
.wt-title .cover-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.wt-title .cover-grad{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(4,6,12,.55) 60%,rgba(4,6,12,.82) 80%,rgba(4,6,12,.93) 100%)}
.wt-title .cover-text{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px}

/* 공통 */
#tbar{position:fixed;top:10px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.18);font-size:11px;font-family:sans-serif;letter-spacing:.15em;pointer-events:none;white-space:nowrap;z-index:100}
#status{position:fixed;bottom:12px;left:16px;color:rgba(255,255,255,.18);font-family:sans-serif;font-size:10px;letter-spacing:.08em;z-index:100}
</style>
</head>
<body>

<div id="loading"><div class="star">★</div><p id="loadmsg">이미지 목록 로드 중…</p></div>
<div id="tbar">이야기가 마르던 밤</div>

<!-- 서적뷰 -->
<div id="book-view"></div>

<!-- 웹툰뷰 -->
<div id="webtoon-view"></div>

<!-- 서적뷰 네비 -->
<div id="nav">
  <button class="nb" id="prev" onclick="go(-1)">↑</button>
  <span id="ind">— / —</span>
  <button class="nb" id="next" onclick="go(1)">↓</button>
</div>

<div id="status"></div>

// ── 텍스트 ───────────────────────────────────────────────
const T={
 1:"옛날, 아주 먼 옛날.<br>하늘의 별들이 지금보다 훨씬 낮게 떠 있던 시절이 있었습니다.<br><br>손을 뻗으면 닿을 것처럼.<br>지붕 위에 앉으면 별의 숨소리가 들릴 것처럼.<br><br>그 시절, 세상의 이름은 누리였습니다.",
 2:"누리의 별들은 조금 특별했습니다.<br><br>빛나는 일 말고, 좋아하는 일이 하나 더 있었거든요.<br><br>이야기를 듣는 일이었습니다.",
 3:"그래서 밤이 되면, 사람들은 언덕에 올랐습니다.<br><br>용감한 기사의 이야기.<br>바다를 건너는 배의 이야기.<br>숲에서 길을 잃은 아이가 반딧불이를 따라 집으로 돌아오는 이야기.<br><br>낮 동안 품은 이야기를, 별에게 들려주는 것입니다.",
 4:"그러면 별은 그 이야기를 가만히 듣고,<br>별빛 속에 고이 품었다가,<br>이윽고 형체를 주었습니다.<br><br>이야기가, 눈에 보이는 모습이 되어 내려오는 것이었습니다.",
 5:"기사의 이야기를 들려준 밤에는<br>갑옷이 별빛으로 반짝이는 기사가 태어났습니다.<br><br>배의 이야기를 들려준 밤에는<br>돛에 별자리가 수놓인 배가.<br><br>반딧불이 이야기를 들려준 밤에는 —<br>반딧불이를 닮은 작고 환한 것이 태어나,<br>길 잃은 아이들의 어깨에 앉아 주었다고 합니다.",
 6:"그렇게 태어난 존재들이<br>들판에서, 바다에서, 골목에서 살았습니다.<br><br>누리는 이야기로 지어진 세상이었고,<br>이야기로 태어난 이웃들로 가득했습니다.",
 7:"옛사람들은 아이들에게 말했습니다.<br><br>&#8220;별은 약속하지 않는단다.<br>어떤 이야기가 어떤 존재가 될지는 별만이 알지.<br><br>하지만 별은 거짓말도 하지 않아.<br>정성껏 들려준 이야기를 허투루 듣는 법은 없단다.&#8221;",
 8:"그런데 어느 해부터였을까요.<br><br>언덕에 오르는 발걸음이 하나, 둘, 줄었습니다.<br><br>아무도 모르게, 이야기는 서서히 말라갔습니다.",
 9:"이야기를 듣지 못한 별들은 배가 고파졌습니다.<br><br>배고픈 별은 빛이 흐려집니다.<br>흐려진 별빛 아래에서,<br>세상의 것들이 지워지기 시작했습니다.",
10:"처음 지워진 것은 아주 작은 것들이었습니다.<br><br>우물가 세 번째 돌의 이름.<br>빵집 골목의 오래된 노래.<br>어떤 모험 이야기의 마지막 문장.<br><br>너무 작아서, 사라진 줄도 몰랐습니다.",
11:"지워짐은 멈추지 않았습니다.<br><br>이름을 잃은 들판은 자기가 들판이었다는 것을 잊었습니다.<br>노래를 잊은 바다는 파도치는 법을 자꾸 틀렸습니다.<br><br>이야기로 태어난 이웃들도, 하나둘 옅어져 갔습니다.",
12:"별빛 기사는 마지막까지 마을 어귀를 지켰습니다.<br><br>&#8220;내 이야기를 기억해 주는 이가 한 사람이라도 있는 한,<br>나는 사라지지 않아.&#8221;<br><br>그렇게 말했지만 —<br>기억하는 이들의 창문도, 하나둘 어두워지고 있었습니다.",
13:"어느 저녁, 아이 하나가 물었습니다.<br><br>&#8220;할머니, 별한테 이야기를 들려주면 친구가 태어난다는 게 정말이에요?&#8221;<br><br>할머니는 오래 말이 없다가, 창밖을 보았습니다.<br><br>&#8220;&#8230;글쎄다. 옛날에는 그랬다는데.&#8221;",
14:"그리고 마침내 —<br>굶주림에 지친 별들이, 잠들기 시작했습니다.<br><br>동쪽 하늘의 큰 별이 제일 먼저 눈을 감았습니다.<br><br>별 하나가, 잠들었습니다.",
15:"서쪽 하늘의 등불별이 눈을 감았습니다.<br><br>별 둘이, 잠들었습니다.<br><br>남쪽 바다의 뱃길별이 마지막 배 한 척을 배웅하고 눈을 감았습니다.<br><br>별 셋이, 잠들었습니다.",
16:"하나, 또 하나.<br>밤마다 하늘은 조용히 어두워졌습니다.<br><br>이제 남은 별은 하나.<br><br>하늘 끝, 가장 높은 곳의 가장 작은 별이었습니다.",

// ── 이미지 생성 (공통) ───────────────────────────────────
function mkImgEl(n,cls){
  const id=FILE_IDS[n];
  if(!id){const d=document.createElement('div');d.className='img-err';d.innerHTML=`<div class="num">${String(n).padStart(2,'0')}</div><div>ID 없음</div>`;return d;}
  const urls=fallbacks(id);let idx=0;
  const img=document.createElement('img');
  if(cls)img.className=cls;
  img.referrerPolicy='no-referrer';
  img.src=urls[0];
  img.onerror=()=>{if(++idx<urls.length)img.src=urls[idx];};
  img.alt='장면 '+n;
  return img;
}

let spreadEls=[];let cur=0;

function bkTxt(n){
  const c=BCFG[n];if(!c||c.m==='none'||!T[n])return null;
  const d=document.createElement('div');
  d.className='txt'+
    (c.m==='ov'?' t-ov':c.m==='ovS'?' t-ovS':c.m==='pl'?' t-pl pos-'+c.p:' t-pd pos-'+c.p)+
    (c.sm?' sm':'');
  const p=document.createElement('p');p.innerHTML=T[n];d.appendChild(p);return d;
}
function bkScene(n){
  const d=document.createElement('div');d.className='pg-fill';
  d.appendChild(mkImgEl(n,'pg-img'));
  const t=bkTxt(n);if(t)d.appendChild(t);return d;
}
function half(){const d=document.createElement('div');d.style.cssText='position:relative;flex:1;overflow:hidden';return d;}
function spine(){const d=document.createElement('div');d.style.cssText='position:absolute;top:0;bottom:0;left:50%;width:44px;transform:translateX(-50%);background:linear-gradient(to right,transparent,rgba(0,0,0,.25) 46%,rgba(0,0,0,.35) 50%,rgba(0,0,0,.25) 54%,transparent);pointer-events:none;z-index:5';return d;}

function buildBook(){
  const wrap=document.getElementById('book-view');
  BSPREADS.forEach(s=>{
    const w=document.createElement('div');w.className='spread';
    if(s.rv){const r=document.createElement('div');r.className='review';r.textContent=s.rv;w.appendChild(r);}
    if(s.t==='title'){
      const L=half(),R=half();
      L.style.background='#0b0f1a';
      const tp=document.createElement('div');tp.className='titlepage';
      const btn=document.createElement('button');btn.id='toggle-btn';btn.textContent='웹툰으로 보기';btn.onclick=toggleView;
      const coverImg=mkImgEl(0,'cover-img');
      const grad=document.createElement('div');grad.className='cover-grad';
      const ct=document.createElement('div');ct.className='cover-text';
      ct.innerHTML='<div class="star-deco">✦</div><h1>이야기가 마르던 밤</h1><div class="sub">THE NIGHT WHEN STORIES RAN DRY</div>';
      btn.style.cssText='position:absolute;top:16px;right:16px;z-index:3;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.65);font-family:sans-serif;font-size:11px;letter-spacing:.1em;padding:6px 14px;border-radius:20px;cursor:pointer;backdrop-filter:blur(6px)';
      tp.appendChild(coverImg);tp.appendChild(grad);tp.appendChild(ct);tp.appendChild(btn);
      R.appendChild(tp);w.appendChild(L);w.appendChild(R);w.appendChild(spine());
    }else if(s.t==='pair'){
      const L=half(),R=half();
      L.appendChild(bkScene(s.L));R.appendChild(bkScene(s.R));
      w.appendChild(L);w.appendChild(R);w.appendChild(spine());
    }else if(s.t==='textL'){
      const L=half(),R=half();
      const tp=document.createElement('div');tp.className='textpage';
      const p=document.createElement('p');p.innerHTML=T[s.R];tp.appendChild(p);
      L.appendChild(tp);R.appendChild(mkImgEl(s.R,'pg-img'));
      w.appendChild(L);w.appendChild(R);w.appendChild(spine());
    }else if(s.t==='dark16'){
      const L=half(),R=half();
      const tp=document.createElement('div');tp.className='textpage dark';
      const p=document.createElement('p');p.innerHTML=T[16];p.style.textAlign='center';tp.appendChild(p);
      L.appendChild(tp);R.appendChild(mkImgEl(16,'pg-img'));
      w.appendChild(L);w.appendChild(R);w.appendChild(spine());
    }else if(s.t==='full23'){
      w.classList.add('fullbleed');w.style.display='block';
      const pg=document.createElement('div');pg.style.cssText='position:absolute;inset:0';
      pg.appendChild(mkImgEl(23,'pg-img'));w.appendChild(pg);
    }else if(s.t==='endR'){
      const L=half(),R=half();
      L.appendChild(bkScene(s.L));
      const ep=document.createElement('div');ep.className='endpage';
      ep.innerHTML='<p>✦<br><br>끝</p><div class="credit">나눔명조 © 네이버</div>';
      R.appendChild(ep);w.appendChild(L);w.appendChild(R);w.appendChild(spine());
    }
    wrap.appendChild(w);
    spreadEls.push(w);
  });
  const io=new IntersectionObserver(en=>{en.forEach(e=>{if(e.isIntersecting&&e.intersectionRatio>=0.4){const i=spreadEls.indexOf(e.target);if(i>=0&&i!==cur){cur=i;upd();}}});},{threshold:0.4});
  spreadEls.forEach(el=>io.observe(el));
  fitFont();upd();
}

function upd(){
  document.getElementById('ind').textContent=(cur+1)+'\n/\n'+BSPREADS.length;
  document.getElementById('prev').disabled=cur===0;
  document.getElementById('next').disabled=cur===BSPREADS.length-1;
}
function go(d){const n=cur+d;if(n<0||n>=spreadEls.length)return;cur=n;spreadEls[n].scrollIntoView({behavior:'smooth',block:'center'});upd();}

// ════════════════════════════════
// 웹툰뷰 빌드
// ════════════════════════════════
function buildWebtoon(){
  const wrap=document.getElementById('webtoon-view');

  // 타이틀 블록
  const titleBlock=document.createElement('div');titleBlock.className='wt-scene';
  const titleEl=document.createElement('div');titleEl.className='wt-title';
  const wtCoverImg=mkImgEl(0,'cover-img');
  const wtGrad=document.createElement('div');wtGrad.className='cover-grad';
  const wtCt=document.createElement('div');wtCt.className='cover-text';
  wtCt.innerHTML='<div class="star-deco">✦</div><h1>이야기가 마르던 밤</h1><div class="sub">THE NIGHT WHEN STORIES RAN DRY</div>';
  const wtBtn=document.createElement('button');
  wtBtn.style.cssText='position:absolute;top:16px;right:16px;z-index:3;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.65);font-family:sans-serif;font-size:11px;letter-spacing:.1em;padding:6px 14px;border-radius:20px;cursor:pointer;backdrop-filter:blur(6px)';
  wtBtn.textContent='서적으로 보기';wtBtn.onclick=toggleView;
  titleEl.appendChild(wtCoverImg);titleEl.appendChild(wtGrad);titleEl.appendChild(wtCt);titleEl.appendChild(wtBtn);
  titleBlock.appendChild(titleEl);
  wrap.appendChild(titleBlock);

  // 장면 1~26
  for(let n=1;n<=26;n++){
    const sg=WSEG[n]||{};
    const scene=document.createElement('div');scene.className='wt-scene';

    // 이미지 블록
    const imgWrap=document.createElement('div');imgWrap.className='wt-img';
    const img=mkImgEl(n);img.style.cssText='width:100%;display:block;aspect-ratio:3/4;object-fit:cover';
    imgWrap.appendChild(img);

    // 상단 부착 텍스트
    if(sg.top){
      const tp=document.createElement('div');tp.className='wt-top';
      const p=document.createElement('p');p.innerHTML=sg.top;tp.appendChild(p);
      imgWrap.appendChild(tp);
    }
    // 하단 오버레이 텍스트
    if(sg.bot||sg.botS){
      const ov=document.createElement('div');
      ov.className=sg.botS?'wt-ovS':'wt-ov';
      const p=document.createElement('p');p.innerHTML=sg.botS||sg.bot;ov.appendChild(p);
      imgWrap.appendChild(ov);
    }
    scene.appendChild(imgWrap);

    // 간격 텍스트 (간격 자체가 확장 여백 역할)
    if(sg.gap){
      const gap=document.createElement('div');
      gap.className='wt-gap'+(sg.gap.a?' '+sg.gap.a:'')+(sg.gap.nw?' narrow':'');
      const p=document.createElement('p');p.innerHTML=sg.gap.h;gap.appendChild(p);
      scene.appendChild(gap);
    }else if(n<26){
      // 간격 텍스트 없는 장면만 스페이서
      const rule=document.createElement('div');rule.className='wt-rule';
      scene.appendChild(rule);
    }

    wrap.appendChild(scene);
  }

  // 엔딩
  const end=document.createElement('div');end.className='wt-gap center';
  end.style.padding='8vh 10%';
  end.innerHTML='<p style="color:#5a4e3e;letter-spacing:.3em;font-size:clamp(14px,3.5vw,18px)">✦<br><br>끝</p>';
  wrap.appendChild(end);
}

// ════════════════════════════════
// 뷰 전환
// ════════════════════════════════
let mode='webtoon';
function toggleView(){
  mode=mode==='book'?'webtoon':'book';
  const bv=document.getElementById('book-view');
  const wv=document.getElementById('webtoon-view');
  const nav=document.getElementById('nav');
  if(mode==='webtoon'){
    bv.classList.add('hidden');
    wv.classList.add('active');
    nav.classList.add('hidden');
    window.scrollTo({top:0});
  }else{
    bv.classList.remove('hidden');
    wv.classList.remove('active');
    nav.classList.remove('hidden');
    window.scrollTo({top:0});
    cur=0;upd();
  }
}

// ════════════════════════════════
// 공통
// ════════════════════════════════
function fitFont(){
  const el=spreadEls[0]||document.querySelector('.spread');
  if(!el)return;
  const fs=Math.max(9,Math.min(16,el.clientWidth*0.0155));
  document.documentElement.style.setProperty('--fs',fs+'px');
}
window.addEventListener('resize',fitFont);
document.addEventListener('keydown',e=>{
  if(mode!=='book')return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ')go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);
});
