function parseCSV(t){const rows=[];for(const l of t.trim().split('\n')){const c=[];let cur='',q=false;for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){c.push(cur.trim());cur='';}else cur+=ch;}c.push(cur.trim());rows.push(c);}return rows;}

async function loadIDs(){
  try{
    const r=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`,{credentials:'omit'});
    if(!r.ok)throw new Error(r.status);
    const rows=parseCSV(await r.text()).slice(1);
    const m={};
    rows.forEach(r=>{const n=parseInt(r[0]);if(n>=1&&n<=26&&r[2])m[n]=r[2];});
    if(Object.keys(m).length>20){document.getElementById('status').textContent='시트에서 ID 로드 완료';return m;}
    throw new Error('행 부족');
  }catch(e){
    document.getElementById('status').textContent='시트 로드 실패 — 내장 ID 사용: '+e.message;
    return FALLBACK_IDS;
  }
}

  img.referrerPolicy='no-referrer';
  img.src=urls[0];
  img.onerror=()=>{if(++idx<urls.length)img.src=urls[idx];};
  img.alt='장면'+n;
  return img;
}

function mkTxt(n){
  const c=CFG[n];
  if(!c||c.m==='none'||!T[n])return null;
  const d=document.createElement('div');
  d.className='txt'+
    (c.m==='ov'?' t-ov':c.m==='ovS'?' t-ovS':c.m==='pl'?' t-pl pos-'+c.p:' t-pd pos-'+c.p)+
    (c.sm?' sm':'');
  const p=document.createElement('p');p.innerHTML=T[n];d.appendChild(p);
  return d;
}

function mkScene(n){
  const d=document.createElement('div');d.className='pg-fill';
  d.appendChild(mkImg(n));
  const t=mkTxt(n);if(t)d.appendChild(t);
  return d;
}

function sp(el,...cs){cs.forEach(c=>el.classList.add(c));return el;}

function build(){
  const wrap=document.getElementById('swrap');
  const spine=()=>{const d=document.createElement('div');d.style.cssText='position:absolute;top:0;bottom:0;left:50%;width:44px;transform:translateX(-50%);background:linear-gradient(to right,transparent,rgba(0,0,0,.28) 46%,rgba(0,0,0,.38) 50%,rgba(0,0,0,.28) 54%,transparent);pointer-events:none;z-index:5';return d;};
  const half=()=>{const d=document.createElement('div');d.style.cssText='position:relative;flex:1;overflow:hidden';return d;};

  SPREADS.forEach(s=>{
    const w=document.createElement('div');w.className='spread';
    if(s.rv){const r=document.createElement('div');r.className='review';r.textContent=s.rv;w.appendChild(r);}

    if(s.t==='title'){
      w.style.background='#0b0f1a';
      const L=half(),R=half();
      L.style.background='#0b0f1a';
      const tp=document.createElement('div');tp.className='titlepage';
      tp.innerHTML='<div class="star">✦</div><h1>이야기가 마르던 밤</h1><div class="sub">NURI · PICTURE BOOK</div>';
      R.appendChild(tp);w.appendChild(L);w.appendChild(R);w.appendChild(spine());
    }else if(s.t==='pair'){
      const L=half(),R=half();
      L.appendChild(mkScene(s.L));R.appendChild(mkScene(s.R));
      w.appendChild(L);w.appendChild(R);w.appendChild(spine());
    }else if(s.t==='textL'){
      const L=half(),R=half();
      const tp=document.createElement('div');tp.className='textpage';
      const p=document.createElement('p');p.innerHTML=T[s.R];tp.appendChild(p);
      L.appendChild(tp);R.appendChild(mkImg(s.R));
      w.appendChild(L);w.appendChild(R);w.appendChild(spine());
    }else if(s.t==='dark16'){
      const L=half(),R=half();
      const tp=document.createElement('div');tp.className='textpage dark';
      const p=document.createElement('p');p.innerHTML=T[16];p.style.textAlign='center';tp.appendChild(p);
      L.appendChild(tp);R.appendChild(mkImg(16));
      w.appendChild(L);w.appendChild(R);w.appendChild(spine());
    }else if(s.t==='full23'){
      w.classList.add('fullbleed');w.style.display='block';
      const pg=document.createElement('div');pg.style.cssText='position:absolute;inset:0';
      pg.appendChild(mkImg(23));w.appendChild(pg);
    }else if(s.t==='endR'){
      const L=half(),R=half();
      L.appendChild(mkScene(s.L));
      const ep=document.createElement('div');ep.className='endpage';
      ep.innerHTML='<p>✦<br><br>끝</p><div class="credit">나눔명조 © 네이버</div>';
      R.appendChild(ep);w.appendChild(L);w.appendChild(R);w.appendChild(spine());
    }

    wrap.appendChild(w);
    spreadEls.push(w);
  });

  const io=new IntersectionObserver(en=>{en.forEach(e=>{if(e.isIntersecting&&e.intersectionRatio>=0.4){const i=spreadEls.indexOf(e.target);if(i>=0&&i!==cur){cur=i;upd();}}});},{threshold:0.4});
  spreadEls.forEach(el=>io.observe(el));
  fitFont();upd();
}

function upd(){
  document.getElementById('ind').textContent=(cur+1)+'\n/\n'+SPREADS.length;
  document.getElementById('prev').disabled=cur===0;
  document.getElementById('next').disabled=cur===SPREADS.length-1;
}
function go(d){const n=cur+d;if(n<0||n>=spreadEls.length)return;cur=n;spreadEls[n].scrollIntoView({behavior:'smooth',block:'center'});upd();}
function fitFont(){const el=spreadEls[0];if(!el)return;const fs=Math.max(9,Math.min(16,el.clientWidth*0.0155));document.documentElement.style.setProperty('--fs',fs+'px');}
window.addEventListener('resize',fitFont);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ')go(1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);});

(async()=>{
  IDS=await loadIDs();
  build();
  document.getElementById('loading').classList.add('done');
})();
</script>
</body>
</html>
