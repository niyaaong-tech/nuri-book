<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="referrer" content="no-referrer">
<title>이야기가 마르던 밤</title>
<link rel="preload" href="/assets/fonts/NanumMyeongjo-Regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/assets/fonts/NanumMyeongjo-Bold.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/viewer.css">
<style>
@font-face{font-family:'Nanum Myeongjo';src:url('/assets/fonts/NanumMyeongjo-Regular.woff2') format('woff2');font-style:normal;font-weight:400;font-display:block}
@font-face{font-family:'Nanum Myeongjo';src:url('/assets/fonts/NanumMyeongjo-Bold.woff2') format('woff2');font-style:normal;font-weight:700;font-display:block}
body{font-family:'Nanum Myeongjo','NanumMyeongjo','AppleMyungjo','Batang',serif;font-synthesis:none}
#webtoon-view{padding-top:clamp(24px,6vh,56px)}
.scene-20 .wt-top-caption{padding-top:2.75%}
.scene-21 .wt-top-caption{top:50%;transform:translateY(-50%);padding-top:5.5%;padding-bottom:5.5%;text-align:left}
.scene-23 .wt-top-caption{padding-top:16.5%}
.scene-25 .scene25-after{justify-content:flex-start;text-align:left}
.scene-15 .wt-top-caption .text-line:nth-of-type(2),
.scene-15 .wt-top-caption .text-line:nth-of-type(4),
#book-view .spread:nth-of-type(9) .book-page:first-child .book-caption .text-line:nth-of-type(2),
#book-view .spread:nth-of-type(9) .book-page:first-child .book-caption .text-line:nth-of-type(4),
.scene-15 .wt-top-caption br:nth-of-type(2),
.scene-15 .wt-top-caption br:nth-of-type(4),
#book-view .spread:nth-of-type(9) .book-page:first-child .book-caption br:nth-of-type(2),
#book-view .spread:nth-of-type(9) .book-page:first-child .book-caption br:nth-of-type(4){display:none}

/* 이미지 텍스트 오버레이 정책 */
.wt-top-caption,
.wt-cut-caption,
.wt-panel-caption.upper{background:none!important;text-shadow:none}
.wt-overlay{background:linear-gradient(to bottom,transparent 0%,rgba(3,5,10,.14) 35%,rgba(3,5,10,.335) 72%,rgba(3,5,10,.39) 100%);text-shadow:none}
.wt-panel-caption.lower{background:linear-gradient(to bottom,transparent 0%,rgba(3,5,10,.16) 54%,rgba(3,5,10,.31) 100%);text-shadow:none}
.book-caption{background:linear-gradient(to bottom,transparent 0%,rgba(3,5,10,.19) 32%,rgba(3,5,10,.38) 68%,rgba(3,5,10,.44) 100%);text-shadow:none}
.scene-10 .wt-cut-caption.cut-1,
.scene-10 .wt-cut-caption.cut-3{text-shadow:0 0 2px rgba(30,26,22,.72),0 0 7px rgba(30,26,22,.48)}

/* 본문은 나눔명조 Bold를 기본으로 사용한다. */
.book-caption p,
.wt-overlay p,
.wt-gap p,
.wt-top-caption p,
.wt-cut-caption p,
.wt-panel-caption p,
.wt-end p{font-weight:700}

/* 표지로 돌아가는 공통 고정 버튼 */
#cover-home{position:fixed;z-index:650;top:max(12px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right));min-width:54px;height:38px;padding:0 13px;border:1px solid rgba(255,255,255,.32);border-radius:999px;background:rgba(18,18,18,.58);backdrop-filter:blur(10px);box-shadow:0 4px 16px rgba(0,0,0,.42);color:rgba(255,255,255,.9);font-family:system-ui,sans-serif;font-size:11px;letter-spacing:.06em;cursor:pointer}
#cover-home:hover{background:rgba(18,18,18,.8);color:#fff}
.wt-cover .view-toggle,.book-cover .view-toggle{right:82px}

/* PC 1배율에서 작은 명조체의 획이 깨지지 않도록 정수 픽셀 크기로 표시한다. */
@media (min-width:721px){
  .wt-overlay,
  .wt-gap,
  .wt-top-caption,
  .wt-cut-caption,
  .wt-panel-caption{--pad-x:7%}
  .wt-overlay p,
  .wt-gap p,
  .wt-top-caption p,
  .wt-cut-caption p,
  .wt-panel-caption p{font-size:23px;line-height:2;text-rendering:auto}
  .book-caption p{font-size:16px;text-rendering:auto}
}
@media(max-width:720px){
  #cover-home{top:max(8px,env(safe-area-inset-top));right:max(8px,env(safe-area-inset-right));min-width:48px;height:34px;padding:0 11px;font-size:10px}
  .wt-cover .view-toggle,.book-cover .view-toggle{right:68px}
}
</style>
<link rel="stylesheet" href="/book-layout.css">
</head>
<body>
<div id="loading"><div class="star">★</div><p id="load-message">이미지 목록 로드 중…</p></div>
<div id="titlebar">이야기가 마르던 밤</div>
<button id="cover-home" type="button" aria-label="표지로 이동">표지</button>
<div id="book-view"></div>
<div id="webtoon-view"></div>
<nav id="nav" aria-label="페이지 이동">
<button class="nav-btn" id="prev" type="button" aria-label="이전 페이지">↑</button>
<div id="indicator">—</div>
<button class="nav-btn" id="next" type="button" aria-label="다음 페이지">↓</button>
</nav>
<div id="status" aria-live="polite"></div>
<script src="/scenes.js"></script>
<script src="/viewer.js"></script>
<script src="/book-layout.js"></script>
<script>
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(()=>{if(typeof queueTextFit==='function')queueTextFit()})}

(()=>{
  if('scrollRestoration' in history)history.scrollRestoration='manual';

  const resetToTop=()=>{
    document.documentElement.scrollTop=0;
    document.body.scrollTop=0;
    window.scrollTo(0,0);
  };

  const settleAtTop=()=>{
    resetToTop();
    requestAnimationFrame(resetToTop);
    setTimeout(resetToTop,80);
    setTimeout(resetToTop,320);
  };

  document.getElementById('cover-home').addEventListener('click',()=>{
    window.scrollTo({top:0,left:0,behavior:'smooth'});
  });

  document.addEventListener('click',event=>{
    if(event.target.closest('.view-toggle'))setTimeout(settleAtTop,0);
  });

  window.addEventListener('pageshow',settleAtTop);

  const observer=new MutationObserver(()=>{
    if(document.querySelector('#webtoon-view.active>.wt-cover,#book-view.active>.spread'))settleAtTop();
  });
  observer.observe(document.getElementById('webtoon-view'),{childList:true,attributes:true,attributeFilter:['class']});
  observer.observe(document.getElementById('book-view'),{childList:true,attributes:true,attributeFilter:['class']});

  settleAtTop();
})();
</script>
</body>
</html>
