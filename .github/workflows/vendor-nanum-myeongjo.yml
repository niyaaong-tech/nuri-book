name: Vendor Nanum Myeongjo

on:
  pull_request:
    paths:
      - '.font-vendor-trigger'
      - '.github/workflows/vendor-nanum-myeongjo.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vendor-fonts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Build Nanum Myeongjo WOFF2 from official Google Fonts source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/google-fonts
          git clone --depth 1 --filter=blob:none --sparse https://github.com/google/fonts.git /tmp/google-fonts
          git -C /tmp/google-fonts sparse-checkout set ofl/nanummyeongjo

          python -m pip install --quiet 'fonttools[woff]'
          mkdir -p assets/fonts
          python - <<'PY'
          from pathlib import Path
          from fontTools.ttLib import TTFont

          src_dir = Path('/tmp/google-fonts/ofl/nanummyeongjo')
          out_dir = Path('assets/fonts')
          for weight in ('Regular', 'Bold'):
              font = TTFont(src_dir / f'NanumMyeongjo-{weight}.ttf')
              font.flavor = 'woff2'
              font.save(out_dir / f'NanumMyeongjo-{weight}.woff2')
          PY
          cp /tmp/google-fonts/ofl/nanummyeongjo/OFL.txt assets/fonts/OFL-NanumMyeongjo.txt

          test "$(head -c 4 assets/fonts/NanumMyeongjo-Regular.woff2)" = 'wOF2'
          test "$(head -c 4 assets/fonts/NanumMyeongjo-Bold.woff2)" = 'wOF2'

      - name: Commit font bundle to PR branch
        shell: bash
        run: |
          set -euo pipefail
          git add assets/fonts
          if git diff --cached --quiet; then
            echo 'Font files already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Vendor Nanum Myeongjo webfonts [skip ci]'
          git push origin "HEAD:${{ github.head_ref }}"
