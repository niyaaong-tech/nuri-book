name: Vendor Nanum Myeongjo

on:
  pull_request:
    paths:
      - '.font-vendor-trigger'
      - '.github/workflows/vendor-nanum-myeongjo.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vendor-fonts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Nanum Myeongjo webfonts and license
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/fonts
          curl -L --fail --retry 3 \
            'https://cdn.jsdelivr.net/gh/sweetherofonts/fontshero_pack3/nanum-myeongjo/nanum-myeongjo-Regular.woff2' \
            -o assets/fonts/NanumMyeongjo-Regular.woff2
          curl -L --fail --retry 3 \
            'https://cdn.jsdelivr.net/gh/sweetherofonts/fontshero_pack3/nanum-myeongjo/nanum-myeongjo-Bold.woff2' \
            -o assets/fonts/NanumMyeongjo-Bold.woff2
          curl -L --fail --retry 3 \
            'https://raw.githubusercontent.com/google/fonts/main/ofl/nanummyeongjo/OFL.txt' \
            -o assets/fonts/OFL-NanumMyeongjo.txt

          test "$(head -c 4 assets/fonts/NanumMyeongjo-Regular.woff2)" = 'wOF2'
          test "$(head -c 4 assets/fonts/NanumMyeongjo-Bold.woff2)" = 'wOF2'

      - name: Upload font bundle
        uses: actions/upload-artifact@v4
        with:
          name: nanum-myeongjo-webfonts
          path: assets/fonts
          if-no-files-found: error
          retention-days: 1
